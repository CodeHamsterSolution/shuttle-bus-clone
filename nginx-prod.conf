events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    client_max_body_size 10M;

    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=50r/s;

    server {
        listen 80;
        server_name kasheng.me www.kasheng.me; 

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name kasheng.me www.kasheng.me; 

        ssl_certificate    /etc/letsencrypt/live/kasheng.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kasheng.me/privkey.pem;

        location / {
            limit_req zone=mylimit burst=50 nodelay;
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            limit_req zone=mylimit burst=200 nodelay;
            proxy_pass http://shuttle-backend:8080;
        }

        location /ws-endpoint {
            limit_req zone=mylimit burst=20 nodelay;
            proxy_pass http://shuttle-backend:8080;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /pgadmin/ {
            limit_req zone=mylimit burst=5 nodelay;
            proxy_set_header X-Script-Name /pgadmin;
            proxy_set_header Host $host;
            proxy_pass http://pgadmin:80/;
            proxy_redirect off;
        }
    }
}
