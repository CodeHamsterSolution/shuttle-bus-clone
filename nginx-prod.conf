events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    client_max_body_size 10M;

    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=50r/s;

    server {
        listen 80;
        server_name _;

        # 1. Frontend
        location / {
            limit_req zone=mylimit burst=50 nodelay;
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
        }

        # 2. Backend API
        location /api/ {
            limit_req zone=mylimit burst=200 nodelay;
            proxy_pass http://shuttle-backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. WebSockets
        location /ws-endpoint {
            limit_req zone=mylimit burst=20 nodelay;
            proxy_pass http://shuttle-backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # 4. pgAdmin (via Subpath)
        location /pgadmin/ {
            limit_req zone=mylimit burst=5 nodelay;
            proxy_set_header X-Script-Name /pgadmin;
            proxy_set_header Host $host;
            proxy_pass http://pgadmin:80/;
            proxy_redirect off;
        }
    }
}
