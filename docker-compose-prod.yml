services:
  shuttle-backend:
    build: ./shuttle-backend
    # Removed container_name for better scaling/compatibility
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - TZ=Asia/Kuala_Lumpur
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/shuttle_bus
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - STORAGE_URL=${STORAGE_URL}
      - SECRET_KEY=${JWT_SECRET}
    depends_on:
      postgres-db:
        condition: service_healthy

  postgres-db:
    image: postgres:15-alpine
    # Removed container_name
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      TZ: Asia/Kuala_Lumpur
      POSTGRES_DB: shuttle_bus
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d shuttle_bus" ]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    # Removed container_name
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PG_USERNAME}
      PGADMIN_DEFAULT_PASSWORD: ${PG_PASSWORD}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_LISTEN_PORT: 80
    # If the platform uses a Load Balancer, consider removing 'ports' and 
    # letting the platform handle the ingress mapping.
    # ports:
    #   - "5050:80"
    depends_on:
      - postgres-db

  nginx:
    build:
      context: ./mmu_shuttle_student
      dockerfile: Dockerfile
      args:
        - VITE_GOOGLE_MAPS_API_KEY=${VITE_GOOGLE_MAPS_API_KEY}
        - VITE_GOOGLE_MAPS_ID=${VITE_GOOGLE_MAPS_ID}
        - VITE_API_URL=${VITE_API_URL}
        - VITE_WEB_SOCKET_URL=${VITE_WEB_SOCKET_URL}
    # Removed container_name
    # ports:
    #   - "80:80"
    #   - "443:443"
    volumes:
      - ./nginx-prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - shuttle-backend

volumes:
  postgres_data:
